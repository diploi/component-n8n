diploiVersion: v1.0
type: component
name: n8n
description: Official Diploi component for n8n

supportsAdditionalHosts: { serviceName: 'app'}

hosts:
  - name: n8n
    identifier: app
    port: 5678

parameterGroups:
  - name: Connection
    identifier: postgres
    description: Superuser & connection configuration
    parameters:
      - name: DB_POSTGRESDB_DATABASE
        identifier: DB_POSTGRESDB_DATABASE
        defaultValue: n8n
        type: string
      - name: N8N_HOST
        identifier: N8N_HOST
        defaultValue: http://app.${DIPLOI_NAMESPACE}
        type: string
        readOnly: true
  - name: Config
    identifier: config
    description: n8n onfiguration variables
    parameters:
      - name: N8N_ENCRYPTION_KEY
        identifier: N8N_ENCRYPTION_KEY
        defaultValue: '${generate-random-password:42}'
        type: secret

environmentVariables:
  - identifier: DB_TYPE
    defaultValue: postgresdb
  - identifier: DB_POSTGRESDB_SCHEMA
    defaultValue: public
  - identifier: TZ
    defaultValue: UTC
    
images:
  - identifier: app
    prebuildImage: public.ecr.aws/p8t2q7f4/diploi/component-n8n:[tag]

dependencies:
  - identifier: postgres
    package: https://github.com/diploi/addon-postgres#v17.2
    env:
      include:
        - POSTGRES_HOST:DB_POSTGRESDB_HOST
        - POSTGRES_PORT:DB_POSTGRESDB_PORT
        - POSTGRES_USER:DB_POSTGRESDB_USER
        - POSTGRES_PASSWORD:DB_POSTGRESDB_PASSWORD